<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPanel - Global Consumer Analytics</title>
    <style>
        :root {
            --bg-color: #0a0c0d;
            --miami-blue: #00e5ff; /* هادا هو اللون المياحي المفتوح اللي حبيت عليه */
            --sky-blue: #00a2ff;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* يحط كلش في الوسط */
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* التصويرة المظلمة والمضببة تع الخلفية ضد التجسس */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(10, 12, 13, 0.96) 0%, rgba(10, 12, 13, 0.85) 100%),
                url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1000&auto=format&fit=crop') no-repeat center center/cover;
            filter: blur(8px); /* تضبيب عالي للغموض */
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 600px;
            padding: 30px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .logo span {
            color: var(--miami-blue);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        p.tagline {
            color: #70777a;
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* البوتون المياحي المشع في الوسط */
        .cta-btn {
            background: linear-gradient(135deg, var(--miami-blue), var(--sky-blue));
            color: #000000;
            border: none;
            padding: 18px 45px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.5);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 45px rgba(0, 229, 255, 0.8);
            background: linear-gradient(135deg, var(--sky-blue), var(--miami-blue));
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="main-content">
        <div class="logo">VOX<span>PANEL</span></div>
        <h1>Institutional Research Portal</h1>
        <p class="tagline">Global consumer intelligence and decentralized demographic audits. Access is restricted to authorized panel validation nodes only.</p>
        
        <!-- البوتون الوحيد في الوسط -->
        <a href="#" class="cta-btn">Access Audit Suite</a>
    </div>

</body>
</html>
