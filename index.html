<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPanel - Global Consumer Analytics</title>
    <style>
        :root {
            --bg-color: #040a0f;
            --miami-blue: #00e5ff;
            --sky-blue: #00a2ff;
            --text-light: #ffffff;
            --text-gray: #5f758e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية الطبيعة الزاهية مع الـ Blurry والـ Low Dark Overlay */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(4, 10, 15, 0.88) 0%, rgba(4, 10, 15, 0.75) 100%),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover;
            filter: blur(6px);
            transform: scale(1.05);
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 540px;
            width: 90%;
            padding: 40px 30px;
            background: rgba(11, 18, 24, 0.75);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.08);
            margin-top: auto;
            margin-bottom: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .logo span {
            color: var(--miami-blue);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            line-height: 1.25;
        }

        p.tagline {
            color: #b0c4de;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .cta-btn {
            background: linear-gradient(135deg, var(--miami-blue), var(--sky-blue));
            color: #040a0f;
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.35);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            width: 100%;
            max-width: 340px;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.65);
        }

        footer {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
            padding-bottom: 25px;
            padding-top: 10px;
        }

        footer p {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 6px;
        }

        .footer-links {
            font-size: 12px;
            color: var(--text-gray);
        }

        .footer-links a {
            color: var(--text-gray);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--miami-blue);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 26px;
            }
            p.tagline {
                font-size: 14px;
                margin-bottom: 30px;
            }
            .main-content {
                padding: 35px 20px;
            }
            .cta-btn {
                padding: 16px 30px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="main-content">
        <div class="logo">VOX<span>PANEL</span></div>
        <h1>Claim Your Requested Reward</h1>
        <p class="tagline">Complete the secure user verification below to access your pending reward platform.</p>
        <a href="https://voxpanel.xyz/32213/" class="cta-btn">CLAIM YOUR OFFER</a>
    </div>

    <footer>
        <p>© 2026 VoxPanel Global Research. All rights reserved.</p>
        <div class="footer-links">
            <a href="privacy.html">Privacy Policy</a> | 
            <a href="terms.html">Terms of Service</a> | 
            <a href="contact.html">Contact Us</a>
        </div>
    </footer>

</body>
</html>
