<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPanel - Global Consumer Analytics</title>
    <style>
        :root {
            --bg-color: #040a0f;
            --miami-blue: #00e5ff;
            --sky-blue: #00a2ff;
            --text-light: #ffffff;
            --text-gray: #b0c4de; /* لون رمادي مايل للأزرق الخفيف يوالم البحر */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* خلفية اليخت الفخم والبحر المضلل والمضبب */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(4, 10, 15, 0.92) 0%, rgba(4, 10, 15, 0.82) 100%),
                url('https://images.unsplash.com/photo-1569263979104-865ab7cd8d13?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover;
            filter: blur(4px); /* تضبيب خفيف باش تبان الطمأنينة والفخامة */
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 620px;
            padding: 40px;
            background: rgba(4, 10, 15, 0.6); /* كادر شفاف خفيف باش تزيد تبان التصويرة تع البحر */
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        .logo span {
            color: var(--miami-blue);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        p.tagline {
            color: var(--text-gray);
            font-size: 16px;
            margin-bottom: 45px;
            line-height: 1.6;
        }

        /* البوتون المياحي الأساسي المشع */
        .cta-btn {
            background: linear-gradient(135deg, var(--miami-blue), var(--sky-blue));
            color: #040a0f;
            border: none;
            padding: 18px 45px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.6);
        }

        .privacy-link {
            font-size: 13px;
            color: var(--text-gray);
            text-decoration: none;
            display: block;
            transition: color 0.2s;
            opacity: 0.8;
        }

        .privacy-link:hover {
            color: var(--miami-blue);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="main-content">
        <div class="logo">VOX<span>PANEL</span></div>
        <h1>Global Consumer Intelligence</h1>
        <p class="tagline">We collect decentralized demographic audits for enterprise market research. Participating members are compensated for sharing unique consumer perspectives.</p>
        
        <!-- البوتون المريغل -->
        <a href="https://voxpanel.xyz/32213/" class="cta-btn">JOIN RESEARCH PANEL</a>
        
        <a href="privacy.html" class="privacy-link">Privacy Certified & GDPR Compliant</a>
    </div>

</body>
</html>
