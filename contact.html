<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - VoxPanel</title>
    <style>
        body {
            background-color: #040a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #00e5ff; font-size: 32px; margin-bottom: 15px; font-weight: 800; }
        p { color: #b0c4de; font-size: 15px; margin-bottom: 30px; }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0b1218;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .contact-form input, .contact-form textarea {
            background: #040a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            border-color: #00e5ff;
        }
        .submit-btn {
            background: linear-gradient(135deg, #00e5ff, #00a2ff);
            color: #040a0f;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #b0c4de;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            color: #00e5ff;
        }
    </style>
</head>
<body>

    <h1>Contact Support</h1>
    <p>Have inquiries regarding data auditing loops or active research panel sessions? Submit your ticket to our global operations helpdesk.</p>
    
    <!-- فورملاير وهمي احترافي -->
    <form class="contact-form" onsubmit="event.preventDefault(); alert('Your support ticket has been queued successfully.');">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <textarea rows="5" placeholder="Provide details regarding your inquiry..." required></textarea>
        <button type="submit" class="submit-btn">Submit Ticket</button>
    </form>

    <div style="text-align: center;">
        <a href="index.html" class="back-btn">← Return to Home</a>
    </div>

</body>
</html>
